<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>V-Blocks - Infini</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <script>
    let currentTheme = localStorage.getItem('themeVBlocks') || 'cyber';
    document.documentElement.setAttribute('data-theme', currentTheme);
    window.addEventListener('DOMContentLoaded', () => {
      document.body.setAttribute('data-theme', currentTheme);
    });
  </script>
  <link rel="stylesheet" href="themes/themes.css" id="theme-style" />
  <style>
    :root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100dvh;
  height: 100dvh;
  box-sizing: border-box;
  font-family: 'Quicksand', Arial, sans-serif;
  background: var(--body-bg, #111);
  color: var(--body-color, #ccc);
  overflow: hidden;
}

body {
  min-height: 100dvh;
  height: 100dvh;
  width: 100%;
}

.game-viewport {
  position: fixed;
  inset: 0;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.main-content {
  display: flex;
  flex-direction: column;
  width: min(430px, 100vw);
  max-width: 100vw;
  height: auto;
  min-height: 0;
  box-sizing: border-box;
  align-items: center;
  justify-content: flex-start;
  margin: 0 auto;
  padding-bottom: calc(var(--safe-bottom) + 14px);
  transform-origin: top center;
  will-change: transform;
  --vblocks-ui-scale: 1;
}
.top-bar {
      width: 100%;
      max-width: 430px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: calc(var(--safe-top) + 10px) 10px 0 10px;
      position: relative;
      z-index: 10;
      background: transparent;
    }
    .top-bar-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: 8px;
    }
    .btn-back {
      background: none;
      border: none;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; padding: 4px;
      cursor: pointer;
      width: clamp(32px, calc(42px * var(--vblocks-ui-scale)), 56px);
      height: clamp(32px, calc(42px * var(--vblocks-ui-scale)), 56px);
      transition: background 0.15s;
    }
    .btn-back img {
      width: clamp(20px, calc(28px * var(--vblocks-ui-scale)), 38px);
      height: clamp(20px, calc(28px * var(--vblocks-ui-scale)), 38px);
      filter: drop-shadow(0 1px 2px #0005);
    }
    .main-title {
      flex: 1;
      font-size: clamp(0.98rem, calc(1.25rem * var(--vblocks-ui-scale)), 1.55rem); font-weight: 900;
      color: var(--title-color, #39ff14);
      letter-spacing: 2px; line-height: 1.1;
      text-align: center;
      white-space: pre-line;
      word-break: break-word;
      user-select: none;
    }
    .profile-row {
      display: flex;
      flex-direction: row;
      gap: 8px;
    }
    .btn-icon img {
      width: clamp(20px, calc(27px * var(--vblocks-ui-scale)), 38px);
      height: clamp(20px, calc(27px * var(--vblocks-ui-scale)), 38px);
    }

    .wallet-block {
      width: 100%;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin: 0 0 7px 0;
      min-height: 38px;
    }
    .vcoins, .jetons {
      display: flex;
      align-items: center;
      font-weight: 700;
      justify-content: center;
    }
    .vcoins {
      font-size: 1.19em;
      color: #ffd800;
    }
    .jetons {
      font-size: 1.07em;
      color: #ffd800;
    }
    .vcoin-icon, .jeton-icon {
      width: 27px; height: 27px;
      vertical-align: middle;
      margin-right: 6px;
    }

    @media (max-width:480px) {
      .main-content { width: 100vw; max-width: 100vw; }
      .top-bar { padding: 4px 3px 0 3px; max-width: 100vw; }
      .main-title { font-size: .99em; }
      .btn-back { width: 32px; height: 32px; }
      .btn-back img, .btn-icon img { width: 20px; height: 20px; }
      .wallet-block { gap: 8px; margin-bottom: 4px; }
      .vcoin-icon, .jeton-icon { width: 16px; height: 16px; margin-right: 3px; }
      .vcoins { font-size: .97em; }
      .jetons { font-size: .88em; }
    }
.top-canvas-row {
  width: 100%;
  max-width: 410px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: clamp(10px, 1.8vh, 16px);
  margin-top: -30px;
  flex-shrink: 0;
}
    .side-canvas-block {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .side-canvas-block label {
      font-size: clamp(0.82rem, calc(1rem * var(--vblocks-ui-scale)), 1.2rem);
      font-weight: 700;
      margin-bottom: 2px;
      color: var(--panel-text, #39ff14);
      text-align: center;
    }
#holdCanvas, #nextCanvas {
  background: var(--canvas-panel-bg, #161649);
  border: 2px dashed var(--canvas-panel-border, #00fff7);
  border-radius: 0.4em;
  box-shadow: 0 2px 7px #39ff1411;
  display: block;
  margin: 0 auto;
}

#holdCanvas {
  cursor: pointer;
  touch-action: manipulation;
}
    .game-flex-wrap {
      width: 100%;
      flex: 0 0 auto;
      min-height: 0;
      min-width: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 4px;
    }

    #gameCanvas {
      width: min(100%, 330px);
      max-width: none;
      aspect-ratio: 12/22;
      height: auto;
      max-height: none;
      background: var(--canvas-bg, #180654);
      border-radius: 0.4em;
      box-shadow: 0 6px 32px #39ff1411;
      display: block;
      margin: 0 auto;
      touch-action: none;
    }
    .score-row {
      margin-top: clamp(7px, calc(8px * var(--vblocks-ui-scale)), 12px);
      font-size: clamp(0.92rem, calc(1.08rem * var(--vblocks-ui-scale)), 1.28rem);
      font-weight: 700;
      display: flex; flex-wrap: wrap; justify-content: center; gap: 1em 2em;
      color: var(--score-color, #39ff14);
      width: 97vw; max-width: 430px; letter-spacing: 0.6px; flex-shrink: 0;
    }
    .score-group { display: flex; align-items: center; gap: 0.5em; }
    .score-label { min-width: 50px; text-align: right; color: var(--score-color, #39ff14);}
    .score-value { min-width: 30px; text-align: left; color: var(--score-color, #39ff14); font-weight: 700;}
    .highscore-global { font-size: 1.12em; font-weight: bold; color: #ffd800; margin-left: 1.1em;}
    .highscore-value { color: var(--highscore-color, #ffd800); font-weight: 700; }
    #controls {
      display: flex; justify-content: center; gap: 1.1em; margin-top: 11px; flex-shrink: 0;
    }
    #controls button {
      background: var(--btn-bg, #161649);
      color: var(--btn-color, #39ff14);
      font-weight: 700; border: none; border-radius: 1.1em;
      padding: clamp(0.58em, calc(0.68em * var(--vblocks-ui-scale)), 0.82em) clamp(1.15em, calc(1.4em * var(--vblocks-ui-scale)), 1.75em);
      font-size: clamp(0.92rem, calc(1.03rem * var(--vblocks-ui-scale)), 1.2rem);
      cursor: pointer; box-shadow: 0 1.5px 7px #00fff738;
    }
    #controls button:active {
      background: var(--btn-hover-bg, #181885);
      color: var(--btn-hover-color, #fff);
    }
    /* ===== Tablettes portrait et grands écrans tactiles ===== */
@media (min-width: 701px) and (max-width: 1200px) and (min-height: 900px) {
  .main-content {
    width: min(760px, calc(100vw - 32px)) !important;
    max-width: min(760px, calc(100vw - 32px)) !important;
  }

  .top-bar {
    width: 100% !important;
    max-width: none !important;
    padding-left: 0 !important;
    padding-right: 0 !important;
  }

  .top-canvas-row {
    width: min(100%, 760px) !important;
    max-width: 760px !important;
    margin-top: -12px !important;
    margin-bottom: clamp(12px, 1.4vh, 20px) !important;
  }

  .score-row {
    width: 100% !important;
    max-width: none !important;
  }
}

/* ===== Tablettes paysage / écrans moins hauts ===== */
@media (min-width: 701px) and (max-width: 1200px) and (max-height: 899px) {
  .main-content {
    width: min(640px, calc(100vw - 24px)) !important;
    max-width: min(640px, calc(100vw - 24px)) !important;
  }

  .top-bar {
    width: 100% !important;
    max-width: none !important;
    padding-left: 0 !important;
    padding-right: 0 !important;
  }

  .top-canvas-row {
    width: min(100%, 640px) !important;
    max-width: 640px !important;
    margin-top: -14px !important;
    margin-bottom: clamp(9px, 1.2vh, 16px) !important;
  }

  .score-row {
    width: 100% !important;
    max-width: none !important;
  }
}

      .top-bar {
        width: 100% !important;
        max-width: none !important;
        padding-left: 0 !important;
        padding-right: 0 !important;
      }

      .top-canvas-row {
        width: min(100%, 560px) !important;
        max-width: 560px !important;
        margin-top: -14px !important;
      }

      #gameCanvas {
        width: 100% !important;
        max-width: 400px !important;
      }

      .score-row {
        width: 100% !important;
        max-width: none !important;
      }

      #holdCanvas,
      #nextCanvas {
        width: 60px !important;
        height: 60px !important;
      }
    }


.center-top-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(4px, 2.4vw, 10px);
  min-width: 0;
  padding-bottom: 6px;
  flex-shrink: 1;
}

.top-mini-action {
  background: none;
  border: none;
  cursor: pointer;
  padding: clamp(1px, 0.6vw, 2px);
  border-radius: 99px;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  flex: 0 1 auto;
}

.top-mini-action img {
  width: clamp(20px, calc(25px * var(--vblocks-ui-scale)), 38px);
  height: clamp(20px, calc(25px * var(--vblocks-ui-scale)), 38px);
  display: block;
  object-fit: contain;
}

@media (max-width: 380px) {
  .top-mini-action img {
    width: 22px !important;
    height: 22px !important;
  }
}

@media (max-width: 340px) {
  .top-mini-action img {
    width: 20px !important;
    height: 20px !important;
  }
}
</style>
</head>
<body>
  <canvas id="starfield" style="position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:-1; display:none;"></canvas>
  <div class="game-viewport">
    <div class="main-content">
    <!-- BARRE TOP -->
    <div class="top-bar">
      <div class="top-bar-row">
        <a href="index.html" class="btn-back" title="Retour">
          <img src="assets/icons/arrow_back.svg" alt="Retour" />
        </a>
        <span class="main-title">V-BlocksInfini</span>
        <div class="profile-row">
          <a href="profil.html" class="btn-icon" title="Profil">
            <img src="assets/icons/user.svg" alt="Profil" />
          </a>
          <a href="parametres.html" class="btn-icon" title="Paramètres">
            <img src="assets/icons/settings.svg" alt="Paramètres" />
          </a>
        </div>
      </div>
      <div class="wallet-block">
        <span class="vcoins">
          <img src="assets/images/vcoin.webp" alt="VCoins" class="vcoin-icon">
          <span id="vcoin-amount">0</span>
        </span>
        <span class="jetons">
          <img src="assets/images/jeton.webp" alt="Jetons" class="jeton-icon">
          <span id="jeton-amount">0</span>
        </span>
      </div>
    </div>
    <!-- PIECES -->
    <div class="top-canvas-row">
      <div class="side-canvas-block">
        <label>Réserve</label>
        <canvas id="holdCanvas" width="48" height="48"></canvas>
      </div>
      <div class="center-top-controls">
        <button id="clear-bottom-btn" class="top-mini-action" title="Valider les 5 lignes du bas">
          <img src="assets/icons/clear_bottom_5.svg" alt="Valider les 5 lignes du bas">
        </button>

        <button id="pause-btn" class="top-mini-action" title="Pause">
          <img src="assets/icons/pause.svg" alt="Pause">
        </button>

        <button id="rewind-btn" class="top-mini-action" title="Retour arrière">
          <img src="assets/icons/rewind_5.svg" alt="Retour arrière">
        </button>
      </div>
      <div class="side-canvas-block">
        <label>Suivante</label>
        <canvas id="nextCanvas" width="48" height="48"></canvas>
      </div>
    </div>
    <!-- CANVAS PRINCIPAL -->
    <div class="game-flex-wrap">
      <canvas id="gameCanvas"></canvas>

    </div>
    <!-- SCORE -->
    <div class="score-row" id="score-row">
      <div class="score-group">
        <span class="score-label">Score</span>
        <span class="score-value" id="score">0</span>
      </div>
      <div class="score-group">
        <span class="highscore-global">Record&nbsp;:</span>
        <span class="highscore-value" id="highscore-global">0</span>
      </div>
    </div>
    <div id="controls">
      <button id="music-btn">Musique</button>
      <button onclick="location.reload()">Rejouer</button>
    </div>
    </div>
  </div>
  <audio id="music" src="assets/sounds/chill.mp3" loop></audio>
  <!-- ==== SCRIPTS ==== -->
  <script>
    // Musique bouton
    const music = document.getElementById("music");
    document.getElementById("music-btn").onclick = function() {
      if (music.paused) {
        music.play();
        this.textContent = "Musique";
      } else {
        music.pause();
        this.textContent = "Muet";
      }
    };

    // Affichage VCoins/Jetons depuis Supabase (via userData.js)
    async function updateVCoinsDisplay() {
      let vcoins = 0;
      try {
        if(window.userData && userData.getVCoins) {
          vcoins = await userData.getVCoins();
        }
      } catch(e) { vcoins = 0; }
      document.getElementById("vcoin-amount").textContent = vcoins ?? 0;
    }
    async function updateJetonsDisplay() {
      let jetons = 0;
      try {
        if(window.userData && userData.getJetons) {
          jetons = await userData.getJetons();
        }
      } catch(e) { jetons = 0; }
      document.getElementById("jeton-amount").textContent = jetons ?? 0;
    }
    // Affichage record cloud (Supabase)
    async function updateHighScoreDisplay() {
      if (window.userData && userData.getHighScore) {
        const score = await userData.getHighScore();
        document.getElementById("highscore-global").textContent = score ?? 0;
      }
    }
    // Score en live (partie locale)
    function updateScore(val) {
      document.getElementById("score").textContent = val;
    }

    document.addEventListener("DOMContentLoaded", () => {
      try { window.userData?.paintBalancesFromCache?.(); } catch (_) {}
      updateVCoinsDisplay();
      updateJetonsDisplay();
      updateHighScoreDisplay();
    });
    // Pour update live depuis le jeu (ex: tu bats le record)
    window.updateHighScoreDisplay = updateHighScoreDisplay;
    window.updateVCoinsDisplay = updateVCoinsDisplay;
    window.updateJetonsDisplay = updateJetonsDisplay;
    window.updateScore = updateScore;
  </script>

  <!-- SCRIPTS FONCTIONNELS -->
<!-- Supabase client -->
<script src="js/vendor/supabase-2.42.5.min.js"></script>

<!-- App utils -->
<script src="js/i18n.js"></script>
<script src="js/userData.js"></script>
<script src="js/analytics.js"></script>
<script src="js/crossPromo.js"></script>

<!-- Ads -->
<script src="cordova.js"></script>
<script src="js/achat.js"></script>
<script src="js/pub.js"></script>

<!-- Jeu -->
<script src="js/game.js"></script>

  <!-- Gestion du thème en synchro multi-onglet -->
  <script>
    window.addEventListener("storage", (e) => {
      if (e.key === "themeVBlocks") {
        currentTheme = localStorage.getItem('themeVBlocks') || "cyber";
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.body.setAttribute('data-theme', currentTheme);
        const style = document.getElementById('theme-style');
        if(style) style.href = `themes/themes.css`;
        location.reload();
      }
    });
  </script>
  <!-- Lancement du jeu (doit rester APRES chargement des scripts précédents) -->
  <script>
    if (window.VBlocksGame && typeof window.VBlocksGame.initGame === "function") {
      window.VBlocksGame.initGame({ mode: 'infini' });
    } else {
      console.error("VBlocksGame is not defined. Vérifie l'ordre de tes scripts !");
    }
  </script>
</body>
</html>
