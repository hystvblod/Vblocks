<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>V-Blocks - Infini</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <script>
    let currentTheme = localStorage.getItem('themeVBlocks') || 'cyber';
    document.documentElement.setAttribute('data-theme', currentTheme);
    window.addEventListener('DOMContentLoaded', () => {
      document.body.setAttribute('data-theme', currentTheme);
    });
  </script>
  <link rel="stylesheet" href="themes/themes.css" id="theme-style" />
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100dvh;
      height: 100dvh;
      box-sizing: border-box;
      font-family: 'Quicksand', Arial, sans-serif;
      background: var(--body-bg, #111);
      color: var(--body-color, #ccc);
      overflow: hidden;
    }

    body {
      width: 100%;
      min-height: 100dvh;
      height: 100dvh;
    }

    .game-viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .main-content {
      width: min(430px, 100vw);
      max-width: 100vw;
      height: auto;
      min-height: 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      margin: 0 auto;
      padding-bottom: calc(var(--safe-bottom) + 14px);
      transform-origin: top center;
      will-change: transform;
    }

    .top-bar {
      width: 100%;
      max-width: 430px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: calc(var(--safe-top) + 10px) 10px 0 10px;
      position: relative;
      z-index: 10;
      background: transparent;
      flex: 0 0 auto;
    }

    .top-bar-row {
      width: 100%;
      min-width: 0;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 76px;
      align-items: center;
      gap: 8px;
    }

    .btn-back {
      width: 42px;
      height: 42px;
      padding: 4px;
      border: none;
      border-radius: 50%;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .btn-back img {
      width: 28px;
      height: 28px;
      filter: drop-shadow(0 1px 2px #0005);
    }

    .main-title {
      min-width: 0;
      font-size: 1.25em;
      font-weight: 900;
      color: var(--title-color, #39ff14);
      letter-spacing: 2px;
      line-height: 1.1;
      text-align: center;
      white-space: normal;
      word-break: break-word;
      user-select: none;
    }

    .profile-row {
      width: 76px;
      min-width: 0;
      display: flex;
      flex-direction: row;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn-icon img {
      width: 27px;
      height: 27px;
    }

    .wallet-block {
      width: 100%;
      min-height: 38px;
      margin: 0 0 7px 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .vcoins,
    .jetons {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .vcoins {
      font-size: 1.19em;
      color: #ffd800;
    }

    .jetons {
      font-size: 1.07em;
      color: #ffd800;
    }

    .vcoin-icon,
    .jeton-icon {
      width: 27px;
      height: 27px;
      vertical-align: middle;
      margin-right: 6px;
    }

    .top-canvas-row {
      width: min(410px, 100%);
      max-width: 410px;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: minmax(62px, 78px) minmax(96px, 126px) minmax(62px, 78px);
      align-items: end;
      justify-content: center;
      column-gap: clamp(5px, 2vw, 10px);
      margin: -30px auto 2px auto;
      padding: 0 6px;
      flex: 0 0 auto;
    }

    .side-canvas-block {
      width: 100%;
      min-width: 0;
      max-width: 78px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 2px;
    }

    .side-canvas-block label {
      width: 100%;
      max-width: 78px;
      margin-bottom: 2px;
      font-size: clamp(0.76rem, 3.4vw, 1rem);
      font-weight: 700;
      line-height: 1.05;
      color: var(--panel-text, #39ff14);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #holdCanvas,
    #nextCanvas {
      width: clamp(54px, 18vw, 76px);
      height: clamp(54px, 18vw, 76px);
      max-width: 76px;
      max-height: 76px;
      background: var(--canvas-panel-bg, #161649);
      border: 2px dashed var(--canvas-panel-border, #00fff7);
      border-radius: 0.4em;
      box-shadow: 0 2px 7px #39ff1411;
      display: block;
      margin: 0 auto;
      box-sizing: border-box;
    }

    #holdCanvas {
      cursor: pointer;
      touch-action: manipulation;
    }

    .center-top-controls {
      width: 100%;
      min-width: 0;
      max-width: 126px;
      box-sizing: border-box;
      padding-bottom: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(2px, 1.35vw, 6px);
      overflow: hidden;
    }

    .top-mini-action {
      width: clamp(28px, 8.2vw, 36px);
      height: clamp(28px, 8.2vw, 36px);
      min-width: 0;
      min-height: 0;
      max-width: 36px;
      max-height: 36px;
      padding: 0;
      margin: 0;
      border: none;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
      touch-action: manipulation;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .top-mini-action img,
    .top-mini-action svg {
      width: 100%;
      height: 100%;
      max-width: 36px;
      max-height: 36px;
      display: block;
      object-fit: contain;
      pointer-events: none;
    }

    .game-flex-wrap {
      width: 100%;
      min-width: 0;
      min-height: 0;
      margin-bottom: 4px;
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #gameCanvas {
      width: min(330px, calc(100vw - 46px));
      max-width: 330px;
      aspect-ratio: 12 / 22;
      height: auto;
      max-height: none;
      background: var(--canvas-bg, #180654);
      border-radius: 0.4em;
      box-shadow: 0 6px 32px #39ff1411;
      display: block;
      margin: 0 auto;
      touch-action: none;
    }

    @media (max-width: 480px) {
      .main-content {
        width: 100vw;
        max-width: 100vw;
      }

      .top-bar {
        max-width: 100vw;
        padding: calc(var(--safe-top) + 4px) 3px 0 3px;
      }

      .top-bar-row {
        grid-template-columns: 32px minmax(0, 1fr) 48px;
        gap: 6px;
      }

      .main-title {
        font-size: 0.99em;
        letter-spacing: 1.4px;
      }

      .btn-back {
        width: 32px;
        height: 32px;
      }

      .btn-back img,
      .btn-icon img {
        width: 20px;
        height: 20px;
      }

      .profile-row {
        width: 48px;
        gap: 6px;
      }

      .wallet-block {
        gap: 8px;
        margin-bottom: 4px;
      }

      .vcoin-icon,
      .jeton-icon {
        width: 16px;
        height: 16px;
        margin-right: 3px;
      }

      .vcoins {
        font-size: 0.97em;
      }

      .jetons {
        font-size: 0.88em;
      }

      .top-canvas-row {
        grid-template-columns: 62px 104px 62px;
        column-gap: 5px;
        padding: 0 4px;
      }

      .center-top-controls {
        max-width: 104px;
        gap: 3px;
      }

      .top-mini-action {
        width: 31px;
        height: 31px;
      }

      #holdCanvas,
      #nextCanvas {
        width: 58px;
        height: 58px;
      }

      .side-canvas-block {
        max-width: 62px;
      }

      .side-canvas-block label {
        max-width: 62px;
        font-size: 0.78rem;
      }

      #gameCanvas {
        width: min(330px, calc(100vw - 46px));
      }
    }

    @media (max-width: 340px) {
      .top-canvas-row {
        grid-template-columns: 56px 92px 56px;
        column-gap: 3px;
      }

      .center-top-controls {
        max-width: 92px;
        gap: 2px;
      }

      .top-mini-action {
        width: 28px;
        height: 28px;
      }

      #holdCanvas,
      #nextCanvas {
        width: 52px;
        height: 52px;
      }

      .side-canvas-block {
        max-width: 56px;
      }

      .side-canvas-block label {
        max-width: 56px;
        font-size: 0.7rem;
      }

      #gameCanvas {
        width: min(320px, calc(100vw - 42px));
      }
    }
    .score-row {
      margin-top: 8px; font-size: 1.08em; font-weight: 700;
      display: flex; flex-wrap: wrap; justify-content: center; gap: 1em 2em;
      color: var(--score-color, #39ff14);
      width: 97vw; max-width: 430px; letter-spacing: 0.6px; flex-shrink: 0;
    }
    .score-group { display: flex; align-items: center; gap: 0.5em; }
    .score-label { min-width: 50px; text-align: right; color: var(--score-color, #39ff14);}
    .score-value { min-width: 30px; text-align: left; color: var(--score-color, #39ff14); font-weight: 700;}
    .highscore-global { font-size: 1.12em; font-weight: bold; color: #ffd800; margin-left: 1.1em;}
    .highscore-value { color: var(--highscore-color, #ffd800); font-weight: 700; }
    #controls {
      display: flex; justify-content: center; gap: 1.1em; margin-top: 11px; flex-shrink: 0;
    }
    #controls button {
      background: var(--btn-bg, #161649);
      color: var(--btn-color, #39ff14);
      font-weight: 700; border: none; border-radius: 1.1em;
      padding: 0.68em 1.4em; font-size: 1.03em;
      cursor: pointer; box-shadow: 0 1.5px 7px #00fff738;
    }
    #controls button:active {
      background: var(--btn-hover-bg, #181885);
      color: var(--btn-hover-color, #fff);
    }
    /* ===== Tablettes portrait et grands écrans tactiles ===== */
    @media (min-width: 701px) and (max-width: 1200px) and (min-height: 900px) {
      .main-content {
        width: min(720px, calc(100vw - 32px)) !important;
        max-width: min(720px, calc(100vw - 32px)) !important;
      }

      .top-bar {
        width: 100% !important;
        max-width: none !important;
        padding-left: 0 !important;
        padding-right: 0 !important;
      }

      .top-canvas-row {
        width: min(100%, 700px) !important;
        max-width: 700px !important;
        margin-top: -12px !important;
      }

      #gameCanvas {
        width: 100% !important;
        max-width: 520px !important;
      }

      .score-row {
        width: 100% !important;
        max-width: none !important;
      }

      #holdCanvas,
      #nextCanvas {
        width: 72px !important;
        height: 72px !important;
      }
    }

    /* ===== Tablettes paysage / écrans moins hauts ===== */
    @media (min-width: 701px) and (max-width: 1200px) and (max-height: 899px) {
      .main-content {
        width: min(600px, calc(100vw - 24px)) !important;
        max-width: min(600px, calc(100vw - 24px)) !important;
      }

      .top-bar {
        width: 100% !important;
        max-width: none !important;
        padding-left: 0 !important;
        padding-right: 0 !important;
      }

      .top-canvas-row {
        width: min(100%, 560px) !important;
        max-width: 560px !important;
        margin-top: -14px !important;
      }

      #gameCanvas {
        width: 100% !important;
        max-width: 400px !important;
      }

      .score-row {
        width: 100% !important;
        max-width: none !important;
      }

      #holdCanvas,
      #nextCanvas {
        width: 60px !important;
        height: 60px !important;
      }
    }


.center-top-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(4px, 2.4vw, 10px);
  min-width: 0;
  padding-bottom: 6px;
  flex-shrink: 1;
}

.top-mini-action {
  background: none;
  border: none;
  cursor: pointer;
  padding: clamp(1px, 0.6vw, 2px);
  border-radius: 99px;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  flex: 0 1 auto;
}

.top-mini-action img {
  width: clamp(30px, 10vw, 36px);
  height: clamp(30px, 10vw, 36px);
  display: block;
  object-fit: contain;
}
</style>
</head>
<body>
  <canvas id="starfield" style="position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:-1; display:none;"></canvas>
  <div class="game-viewport">
    <div class="main-content">
    <!-- BARRE TOP -->
    <div class="top-bar">
      <div class="top-bar-row">
        <a href="index.html" class="btn-back" title="Retour">
          <img src="assets/icons/arrow_back.svg" alt="Retour" />
        </a>
        <span class="main-title">V-BlocksInfini</span>
        <div class="profile-row">
          <a href="profil.html" class="btn-icon" title="Profil">
            <img src="assets/icons/user.svg" alt="Profil" />
          </a>
          <a href="parametres.html" class="btn-icon" title="Paramètres">
            <img src="assets/icons/settings.svg" alt="Paramètres" />
          </a>
        </div>
      </div>
      <div class="wallet-block">
        <span class="vcoins">
          <img src="assets/images/vcoin.webp" alt="VCoins" class="vcoin-icon">
          <span id="vcoin-amount">0</span>
        </span>
        <span class="jetons">
          <img src="assets/images/jeton.webp" alt="Jetons" class="jeton-icon">
          <span id="jeton-amount">0</span>
        </span>
      </div>
    </div>
    <!-- PIECES -->
    <div class="top-canvas-row">
      <div class="side-canvas-block">
        <label>Réserve</label>
        <canvas id="holdCanvas" width="48" height="48"></canvas>
      </div>
      <div class="center-top-controls">
        <button id="clear-bottom-btn" class="top-mini-action" title="Valider les 5 lignes du bas">
          <img src="assets/icons/clear_bottom_5.svg" alt="Valider les 5 lignes du bas">
        </button>

        <button id="pause-btn" class="top-mini-action" title="Pause">
          <img src="assets/icons/pause.svg" alt="Pause">
        </button>

        <button id="rewind-btn" class="top-mini-action" title="Retour arrière">
          <img src="assets/icons/rewind_5.svg" alt="Retour arrière">
        </button>
      </div>
      <div class="side-canvas-block">
        <label>Suivante</label>
        <canvas id="nextCanvas" width="48" height="48"></canvas>
      </div>
    </div>
    <!-- CANVAS PRINCIPAL -->
    <div class="game-flex-wrap">
      <canvas id="gameCanvas"></canvas>

    </div>
    <!-- SCORE -->
    <div class="score-row" id="score-row">
      <div class="score-group">
        <span class="score-label">Score</span>
        <span class="score-value" id="score">0</span>
      </div>
      <div class="score-group">
        <span class="highscore-global">Record&nbsp;:</span>
        <span class="highscore-value" id="highscore-global">0</span>
      </div>
    </div>
    <div id="controls">
      <button id="music-btn">Musique</button>
      <button onclick="location.reload()">Rejouer</button>
    </div>
    </div>
  </div>
  <audio id="music" src="assets/sounds/chill.mp3" loop></audio>
  <!-- ==== SCRIPTS ==== -->
  <script>
    // Musique bouton
    const music = document.getElementById("music");
    document.getElementById("music-btn").onclick = function() {
      if (music.paused) {
        music.play();
        this.textContent = "Musique";
      } else {
        music.pause();
        this.textContent = "Muet";
      }
    };

    // Affichage VCoins/Jetons depuis Supabase (via userData.js)
    async function updateVCoinsDisplay() {
      let vcoins = 0;
      try {
        if(window.userData && userData.getVCoins) {
          vcoins = await userData.getVCoins();
        }
      } catch(e) { vcoins = 0; }
      document.getElementById("vcoin-amount").textContent = vcoins ?? 0;
    }
    async function updateJetonsDisplay() {
      let jetons = 0;
      try {
        if(window.userData && userData.getJetons) {
          jetons = await userData.getJetons();
        }
      } catch(e) { jetons = 0; }
      document.getElementById("jeton-amount").textContent = jetons ?? 0;
    }
    // Affichage record cloud (Supabase)
    async function updateHighScoreDisplay() {
      if (window.userData && userData.getHighScore) {
        const score = await userData.getHighScore();
        document.getElementById("highscore-global").textContent = score ?? 0;
      }
    }
    // Score en live (partie locale)
    function updateScore(val) {
      document.getElementById("score").textContent = val;
    }

    document.addEventListener("DOMContentLoaded", () => {
      try { window.userData?.paintBalancesFromCache?.(); } catch (_) {}
      updateVCoinsDisplay();
      updateJetonsDisplay();
      updateHighScoreDisplay();
    });
    // Pour update live depuis le jeu (ex: tu bats le record)
    window.updateHighScoreDisplay = updateHighScoreDisplay;
    window.updateVCoinsDisplay = updateVCoinsDisplay;
    window.updateJetonsDisplay = updateJetonsDisplay;
    window.updateScore = updateScore;
  </script>

  <!-- SCRIPTS FONCTIONNELS -->
<!-- Supabase client -->
<script src="js/vendor/supabase-2.42.5.min.js"></script>

<!-- App utils -->
<script src="js/i18n.js"></script>
<script src="js/userData.js"></script>
<script src="js/analytics.js"></script>
<script src="js/crossPromo.js"></script>

<!-- Ads -->
<script src="cordova.js"></script>
<script src="js/achat.js"></script>
<script src="js/pub.js"></script>

<!-- Jeu -->
<script src="js/game.js"></script>

  <!-- Gestion du thème en synchro multi-onglet -->
  <script>
    window.addEventListener("storage", (e) => {
      if (e.key === "themeVBlocks") {
        currentTheme = localStorage.getItem('themeVBlocks') || "cyber";
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.body.setAttribute('data-theme', currentTheme);
        const style = document.getElementById('theme-style');
        if(style) style.href = `themes/themes.css`;
        location.reload();
      }
    });
  </script>
  <!-- Lancement du jeu (doit rester APRES chargement des scripts précédents) -->
  <script>
    if (window.VBlocksGame && typeof window.VBlocksGame.initGame === "function") {
      window.VBlocksGame.initGame({ mode: 'infini' });
    } else {
      console.error("VBlocksGame is not defined. Vérifie l'ordre de tes scripts !");
    }
  </script>
</body>
</html>
