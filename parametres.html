<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title data-i18n="header.title.settings">Paramètres</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="stylesheet" href="style/main.css" />
  <style>
    html, body {
      height: auto !important;
      min-height: 100vh;
      overflow-y: auto !important;
    }
    body {
      margin: 0;
      font-family: 'Quicksand', Arial, sans-serif;
      background: radial-gradient(ellipse at 60% 40%, #7061e8 0%, #5db9e3 55%, #483070 100%);
      color: #fff;
    }
    .main-content {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 430px;
      box-sizing: border-box;
      align-items: center;
      justify-content: flex-start;
      margin: 0 auto;
      min-height: unset !important;
      height: auto !important;
      padding: 0 10px calc(var(--safe-bottom) + 24px);
    }
    .top-bar {
      width: 100%;
      max-width: 430px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: calc(var(--safe-top) + 10px) 0 0 0;
      position: relative;
      z-index: 10;
      background: transparent;
    }
    .top-bar-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: 8px;
    }
    .btn-back {
      background: none;
      border: none;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; padding: 4px;
      cursor: pointer;
      width: 42px; height: 42px;
      transition: background 0.15s;
    }
    .btn-back img { width: 28px; height: 28px; filter: drop-shadow(0 1px 2px #0005); }
    .main-title {
      flex: 1;
      font-size: 2em; font-weight: 900;
      color: #fff;
      letter-spacing: 2px; line-height: 1.1;
      text-align: center;
      white-space: pre-line;
      word-break: break-word;
      user-select: none;
      text-shadow: 0 3px 16px #2e6ead44, 0 1px 1px #fff7;
    }
    .profile-row { display: flex; flex-direction: row; gap: 8px; }
    .btn-icon img { width: 27px; height: 27px; }
    .param-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 2em;
      gap: 2em;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
    }
    .param-group {
      background: rgba(255,255,255,0.1);
      padding: 1.2em 1.5em;
      border-radius: 1.5em;
      box-shadow: 0 2px 10px #0002;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
    }
    label { font-weight: 800; font-size: 1.1em; display: block; margin-bottom: 0.6em; }
    .lang-select{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap:10px;
      margin-top:22px;
      margin-bottom:22px;
    }

    @media (min-width: 520px){
      .lang-select{
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    .lang-option{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:7px;
      padding:10px 4px 8px;
      border-radius:14px;
      border:0 !important;
      background:transparent !important;
      box-shadow:none !important;
      color:inherit;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      text-align:center;
    }

    .lang-option:active{
      transform:scale(.98);
    }

    .lang-option.selected{
      outline:0;
      box-shadow:0 0 0 2px rgba(255,255,255,.22), 0 14px 34px rgba(0,0,0,.26) !important;
      background:transparent !important;
      border:0 !important;
    }

    .flag{
      width:46px;
      height:32px;
      border-radius:8px;
      overflow:hidden;
      border:0 !important;
      outline:0 !important;
      box-shadow:none !important;
      background:transparent !important;
      flex:0 0 auto;
      display:block;
    }

    .lang-label{
      display:block !important;
      width:100%;
      min-height:24px;
      font-size:10px;
      font-weight:800;
      line-height:1.15;
      color:rgba(255,255,255,.96);
      text-align:center;
      white-space:normal;
      word-break:break-word;
    }
    .switch {
      display: flex; align-items: center; gap: 0.8em; margin-top: 0.7em;
    }
    input[type="checkbox"] {
      width: 24px; height: 24px;
      accent-color: #70dcff;
    }
    button.return-btn {
      background: none; border: 2px dashed #b8ffdb88; color: #fff;
      border-radius: 1.3em; padding: 0.6em 1.4em; font-size: 1em;
      font-weight: 700; cursor: pointer; margin-top: 1em;
    }
    button.return-btn:hover { background: rgba(255, 255, 255, 0.1); }
    .music-btn-img { width: 32px; height: 32px; vertical-align: middle; }
    @media (max-width:480px) {
      .main-content, .top-bar { max-width: 100vw; }
      .top-bar {
        padding: calc(var(--safe-top) + 4px) 3px 0 3px;
        max-width: 99vw;
      }
      .main-title { font-size: 1.4em; }
      .btn-back { width: 32px; height: 32px; }
      .btn-back img, .btn-icon img { width: 20px; height: 20px; }
    }
    @media (min-width: 768px) {
      .main-content,
      .top-bar,
      .param-container {
        max-width: 760px;
      }

      .main-content {
        padding: 0 18px 34px;
      }

      .top-bar {
        padding-top: 16px;
      }

      .main-title {
        font-size: 2.2em;
      }

      .param-group {
        max-width: 720px;
        border-radius: 1.8em;
        padding: 1.35em 1.6em;
      }

      .switch {
        gap: 1em;
      }
    }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="top-bar">
      <div class="top-bar-row">
        <button class="btn-back" id="btn-back" title="Retour" aria-label="Retour">
          <img src="assets/icons/arrow_back.svg" alt="Retour">
        </button>
        <span class="main-title" data-i18n="header.title.settings">Paramètres</span>
        <div class="profile-row">
          <a href="profil.html" class="btn-icon" id="btn-profile" title="Profil">
            <img src="assets/icons/user.svg" alt="Profil">
          </a>
        </div>
      </div>
    </div>

    <div class="param-container">
      <!-- Sélection langue -->
      <div class="param-group">
        <label data-i18n="settings.language.label">Langue de l'interface :</label>
        <div id="langue-select" class="lang-select"></div>
      </div>

      <!-- Publicités -->
      <div class="param-group" id="ads-privacy-group">
        <label data-i18n="settings.ads.label">Publicités personnalisées :</label>
        <button id="ads-privacy-btn" type="button" class="return-btn" data-i18n="index.rgpd.manage" style="margin-top:0;">
          Gérer les accords publicitaires
        </button>
      </div>

      <!-- Pièce fantôme -->
      <div class="param-group">
        <label data-i18n="settings.ghost.label">Afficher la pièce fantôme :</label>
        <div class="switch">
          <input type="checkbox" id="ghost-toggle">
          <span id="ghost-label" data-i18n="settings.ghost.on">Activée</span>
        </div>
      </div>

      <!-- Musique -->
      <div class="param-group">
        <label data-i18n="settings.music.label">Musique :</label>
        <div class="switch" style="gap:0.6em;">
          <button id="music-toggle-btn" aria-label="Musique" style="background:none;border:none;cursor:pointer;padding:0;">
            <img id="music-toggle-img" src="assets/icons/volume-2.svg" alt="Musique activée" class="music-btn-img">
          </button>
          <span id="music-toggle-label" data-i18n="settings.music.on">Activée</span>
        </div>
      </div>

      <!-- Adresse mail -->
      <div style="text-align:center;margin:12px 0;">
        <a href="mailto:help.vboldstudio@gmail.com">help.vboldstudio@gmail.com</a>
      </div>
    </div>
  </div>

  <!-- SDK Supabase AVANT userData.js -->
  <script src="js/vendor/supabase-2.42.5.min.js"></script>
  <!-- Script qui utilise Supabase -->
  <script src="js/userData.js"></script>
  <!-- Charger i18n AVANT le script inline pour pouvoir l'appeler -->
  <script src="js/i18n.js"></script>
  <script src="js/pub.js"></script>

  <script>
    // Appliquer la traduction au plus tôt
    if (window.i18nTranslateAll) window.i18nTranslateAll();
    window.addEventListener("load", () => {
      if (window.i18nTranslateAll) window.i18nTranslateAll();
      const titleNode = document.querySelector('title[data-i18n]');
      if (titleNode && window.i18n) {
        const key = titleNode.getAttribute('data-i18n');
        try { document.title = window.i18n(key) || document.title; } catch(_) {}
      }
    });

    document.addEventListener("DOMContentLoaded", function() {
      const btnBack = document.getElementById('btn-back');
      if (btnBack) {
        btnBack.addEventListener('click', function(e) {
          e.preventDefault();
          if (window.vibrateIfEnabled) window.vibrateIfEnabled(40);
          if (window.history.length > 1) window.history.back();
          else window.location.href = "index.html";
        });
      }
      const btnProfile = document.getElementById('btn-profile');
      if (btnProfile) {
        btnProfile.addEventListener('click', function() {
          if (window.vibrateIfEnabled) window.vibrateIfEnabled(30);
        });
      }
    });

    // ====== LANG (UNIFIÉ — codes MAJ, DB + UI alignées) ======

      { code: "DE",   label: "Deutsch",         flag: `<svg class="flag" viewBox="0 0 22 16"><rect width="22" height="5.33" fill="#000"/><rect y="5.33" width="22" height="5.33" fill="#dd0000"/><rect y="10.67" width="22" height="5.33" fill="#ffce00"/></svg>` },
      { code: "IT",   label: "Italiano",        flag: `<svg class="flag" viewBox="0 0 22 16"><rect width="7.33" height="16" fill="#009246"/><rect x="7.33" width="7.34" height="16" fill="#fff"/><rect x="14.67" width="7.33" height="16" fill="#ce2b37"/></svg>` },
      { code: "ES",   label: "Español",         flag: `<svg class="flag" viewBox="0 0 22 16"><rect width="22" height="16" fill="#aa151b"/><rect y="4" width="22" height="8" fill="#f1bf00"/></svg>` },
      { code: "ES-LATAM", label: "Español (LatAm)", flag: `<svg viewBox="0 0 30 20" aria-hidden="true">
    <defs>
      <radialGradient id="latamGlobeReal1" cx="35%" cy="30%" r="75%">

      <path d="M7.1 4.9c1.4-.9 3-1 4.4-.4c.8.4 1.7.8 2.6.9c-.3 1.1-1 2-1.9 2.7c-.5.4-.8 1-.9 1.7c-1 .2-1.9 0-2.8-.6c-.6-.4-1.1-.9-1.7-1.3c-.5-.3-1-.6-1.7-.8c.2-.8.9-1.5 2-2.2Z" fill="#fff" opacity=".98"/>

      { code: "PT-BR",label: "Português (BR)",  flag: `<svg class="flag" viewBox="0 0 22 16"><rect width="22" height="16" fill="#3eae47"/><ellipse cx="11" cy="8" rx="8" ry="6" fill="#ffcc29"/><circle cx="11" cy="8" r="4" fill="#3e4095"/><path d="M8.3 8.4a3 3 0 0 1 5.4 0" stroke="#fff" stroke-width=".8" fill="none"/><text x="11" y="10.5" font-size="3.3" fill="#fff" text-anchor="middle" alignment-baseline="middle" font-family="Arial">BR</text></svg>` },

      { code: "AR",   label: "العربية",         flag: `<svg class="flag" viewBox="0 0 22 16"><rect width="22" height="16" fill="#fff"/><rect width="22" height="8" y="0" fill="#198754"/><polygon points="5,8 13,4 13,12" fill="#fff"/><circle cx="16" cy="8" r="3" fill="#198754"/></svg>` },

    const langueSelect = document.getElementById("langue-select");

function getSelectedLangForSettings() {
  if (window.VRI18n?.getLang) {
    return String(window.VRI18n.getLang() || "").toUpperCase();
  }
  return String(localStorage.getItem("langue") || "").toUpperCase();
}

function renderLanguageOptions() {
  const selectedLang = getSelectedLangForSettings();
  langueSelect.innerHTML = "";

  LANGS.forEach(l => {
    const opt = document.createElement('div');
    opt.className = 'lang-option' + (l.code === selectedLang ? ' selected' : '');
    opt.innerHTML = `
  <span class="flag">${l.flag}</span>
  <span class="lang-label">${l.label}</span>
`;

    opt.onclick = async () => {
      if (window.setLang) {
        await window.setLang(l.code);
      }

      document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
    };

    langueSelect.appendChild(opt);
  });
}

renderLanguageOptions();

window.addEventListener("vblocks:i18n:changed", renderLanguageOptions);
  </script>

  <script>
  (function(){
    function isNativePlatformSafe() {
      try {
        if (window.Capacitor && typeof window.Capacitor.isNativePlatform === "function") {
          return !!window.Capacitor.isNativePlatform();
        }
      } catch (_) {}
      return false;
    }

async function syncAdsPrivacyUI() {
  const group = document.getElementById("ads-privacy-group");
  const btn = document.getElementById("ads-privacy-btn");
  if (!group || !btn) return;

  group.style.display = "";

  const nativeOk = isNativePlatformSafe();
  const hasOfficialApi =
    !!window.VRAds &&
    typeof window.VRAds.maybeShowGoogleConsentFormOnIndexAfterIntro === "function" &&
    typeof window.VRAds.showGooglePrivacyOptionsForm === "function";

  if (!nativeOk || !hasOfficialApi) {
    btn.disabled = true;
    btn.style.opacity = "0.55";
    btn.style.cursor = "default";
    return;
  }

  btn.disabled = false;
  btn.style.opacity = "1";
  btn.style.cursor = "pointer";
}

document.addEventListener("DOMContentLoaded", async function(){
  await syncAdsPrivacyUI();

  const btn = document.getElementById("ads-privacy-btn");
  if (btn) {
    btn.addEventListener("click", async function(){
      if (btn.disabled) return;

      try {
        const opened = await window.VRAds.showGooglePrivacyOptionsForm();

        if (!opened) {
          await window.VRAds.maybeShowGoogleConsentFormOnIndexAfterIntro?.();
        }
      } catch (_) {
        try {
          await window.VRAds.maybeShowGoogleConsentFormOnIndexAfterIntro?.();
        } catch (_) {}
      }

      await syncAdsPrivacyUI();
    });
  }
});

    document.addEventListener("visibilitychange", function(){
      if (!document.hidden) syncAdsPrivacyUI();
    });
  })();
</script>

  <!-- Ghost + Music (inchangés) -->
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      const ghostToggle = document.getElementById('ghost-toggle');
      const ghostLabel  = document.getElementById('ghost-label');
      try {
        let g = localStorage.getItem('ghostPiece');
        if (g === null) g = localStorage.getItem('ghostEnabled');

        ghostToggle.checked = (g === null) ? true : (g !== 'false');

        function syncGhostLabel() {
          ghostLabel.textContent = ghostToggle.checked
            ? (window.i18nGet ? window.i18nGet('settings.ghost.on') || 'Activée' : 'Activée')
            : (window.i18nGet ? window.i18nGet('settings.ghost.off') || 'Désactivée' : 'Désactivée');
        }

        syncGhostLabel();

        ghostToggle.addEventListener('change', function(){
          const value = ghostToggle.checked ? 'true' : 'false';
          localStorage.setItem('ghostPiece', value);
          localStorage.setItem('ghostEnabled', value);
          syncGhostLabel();
        });
      } catch(_){}

      const btn = document.getElementById('music-toggle-btn');
      const img = document.getElementById('music-toggle-img');
      const lbl = document.getElementById('music-toggle-label');
      function syncMusicUI() {
        const muted = (localStorage.getItem('alwaysMuteMusic') === 'true');
        img.src = muted ? 'assets/icons/volume-x.svg' : 'assets/icons/volume-2.svg';
        lbl.textContent = muted ? (window.i18nGet ? window.i18nGet('settings.music.off') || 'Coupée' : 'Coupée')
                                : (window.i18nGet ? window.i18nGet('settings.music.on')  || 'Activée' : 'Activée');
      }
      if (btn) {
        btn.addEventListener('click', function(){
          const muted = (localStorage.getItem('alwaysMuteMusic') === 'true');
          if (typeof window.setMusicAlwaysMuted === 'function') {
            window.setMusicAlwaysMuted(!muted);
          } else {
            localStorage.setItem('alwaysMuteMusic', (!muted) ? 'true' : 'false');
          }
          syncMusicUI();
        });
      }
      syncMusicUI();
    });
  </script>
</body>
</html>
